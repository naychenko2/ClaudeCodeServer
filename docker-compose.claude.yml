# Локальный запуск ClaudeCodeServer в контейнере-песочнице.
#
#   docker compose -f docker-compose.claude.yml up -d --build
#   docker exec -it claude-server claude login      # один раз: вход по подписке
#
# Контейнер видит ТОЛЬКО проброшенные volume — хостовая ФС Claude недоступна.
# Значения берутся из .env (CLAUDE_PROJECTS_DIR, CLAUDE_EGRESS_PROXY) — см. .env.example.
# Dify (:8080) и OnlyOffice (:8090) — отдельные контейнеры, доступ через host.docker.internal.
# CLAUDE_EGRESS_PROXY используется и при сборке (npm/nuget), и в runtime (вызовы API Claude).

services:
  claude-server:
    build:
      context: .
      dockerfile: backend/ClaudeHomeServer/Dockerfile
      args:
        # Прокси для шагов npm/dotnet restore при сборке (предопределённые build-args Docker)
        HTTP_PROXY: ${CLAUDE_EGRESS_PROXY:-}
        HTTPS_PROXY: ${CLAUDE_EGRESS_PROXY:-}
        NO_PROXY: localhost,127.0.0.1,::1,host.docker.internal
    image: claude-server:latest
    container_name: claude-server
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Пути внутри контейнера (переопределяют appsettings)
      DefaultProjectsPath: /projects
      DataPath: /data/projects.json
      McpConfigPath: /app/.mcp.docker.json
      # Внешние сервисы — через хост-шлюз
      Dify__ApiUrl: http://host.docker.internal:8080/v1
      # Ключ Dify Knowledge (dataset-...) — секрет, значение в .env / .env.prod
      Dify__ApiKey: ${DIFY_API_KEY:-}
      # Platform API-ключ fal.ai для учёта стоимости генераций (billing-events).
      # Это НЕ тот токен, что у MCP fal-ai — отдельный ключ key:secret. Значение в .env.
      Fal__ApiKey: ${FAL_API_KEY:-}
      # Ключи сторонних LLM-провайдеров (DeepSeek, GLM). Пусто = провайдер скрыт.
      # Остальной их конфиг (эндпоинты/модели) — в appsettings.json (секция LlmProviders).
      LlmProviders__deepseek__ApiKey: ${DEEPSEEK_API_KEY:-}
      LlmProviders__glm__ApiKey: ${GLM_API_KEY:-}
      # ServerUrl уходит В БРАУЗЕР (грузит api.js, создаёт iframe) → нужен адрес,
      # видимый с хоста, а не контейнерный host.docker.internal. Указываем на сам
      # бэкенд: YARP проксирует /web-apps/* и версионные пути в OnlyOffice DS.
      # Один origin с фронтом → работает кастомная тема Claude Home.
      OnlyOffice__ServerUrl: http://localhost:5000
      OnlyOffice__BackendUrl: http://host.docker.internal:5000
      # /projects смонтирован как 9p bind-mount (Windows-хост) — inotify там не работает,
      # FileSystemWatcher молчит. Включаем polling-обход дерева для авто-обновления файлов.
      FileWatcher__UsePolling: "true"
      ReverseProxy__Clusters__onlyoffice__Destinations__default__Address: http://host.docker.internal:8090
      # draw.io self-hosted (контейнер drawio из docker-compose.yml) — YARP проксирует /drawio/*
      ReverseProxy__Clusters__drawio__Destinations__default__Address: http://host.docker.internal:8091
      # Egress в интернет через прокси (вызовы API Claude). Пусто = прямой интернет.
      # NO_PROXY исключает локальные адреса (host.docker.internal — Dify/OnlyOffice).
      HTTP_PROXY: ${CLAUDE_EGRESS_PROXY:-}
      HTTPS_PROXY: ${CLAUDE_EGRESS_PROXY:-}
      http_proxy: ${CLAUDE_EGRESS_PROXY:-}
      https_proxy: ${CLAUDE_EGRESS_PROXY:-}
      NO_PROXY: localhost,127.0.0.1,::1,host.docker.internal
      no_proxy: localhost,127.0.0.1,::1,host.docker.internal
    volumes:
      - ${CLAUDE_PROJECTS_DIR:-C:/ClaudeProjects}:/projects
      - claude-data:/data
      - claude-home:/home/app/.claude
      - ./.mcp.docker.json:/app/.mcp.docker.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # Персист конфига claude: реальный .claude.json держим в volume /home/app/.claude,
    # на ожидаемом пути /home/app/.claude.json — симлинк (создаётся на старте). Иначе при
    # пересоздании контейнера файл (он вне volume) теряется → claude разлогинивается → нет ответов.
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -f /home/app/.claude.json ] && [ ! -L /home/app/.claude.json ]; then
          if [ ! -f /home/app/.claude/.claude.json ]; then mv /home/app/.claude.json /home/app/.claude/.claude.json; else rm -f /home/app/.claude.json; fi
        fi
        ln -sf /home/app/.claude/.claude.json /home/app/.claude.json
        exec dotnet ClaudeHomeServer.dll

volumes:
  claude-data:
  claude-home:
