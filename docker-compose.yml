services:
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice-ds
    ports:
      - "8090:80"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice
      - ./onlyoffice/production-linux.json:/etc/onlyoffice/documentserver/production-linux.json
    environment:
      - JWT_ENABLED=false
    # host.docker.internal на Linux требует явного маппинга
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  drawio:
    image: jgraph/drawio:latest
    container_name: drawio
    ports:
      - "8091:8080"
    environment:
      # Sub-path деплой: entrypoint динамически выставляет context-path Tomcat из подпути
      # URL → webapp отдаётся под /drawio/. YARP claude-server проксирует /drawio/* сюда,
      # так фронт грузит редактор с одного origin (нет CORS/mixed-content на проде).
      - DRAWIO_SERVER_URL=http://localhost:5000/drawio/
      - DRAWIO_BASE_URL=http://localhost:5000/drawio
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  onlyoffice_data:
  onlyoffice_log:
