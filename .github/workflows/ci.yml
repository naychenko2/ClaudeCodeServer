name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          # Проекты на net10.0. Раньше тут стояло 9.0.x, и сборка проходила лишь потому,
          # что на образе раннера случайно оказался предустановленный SDK 10.x — при
          # обновлении образа это молча сломалось бы.
          dotnet-version: 10.0.x
      - name: Build
        run: dotnet build backend/ClaudeHomeServer.slnx
      - name: Test
        run: dotnet test backend/ClaudeHomeServer.Tests/ClaudeHomeServer.Tests.csproj --no-build

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      # В коде ~116 существующих lint-ошибок — шаг информационный,
      # пока бэклог не расчищен; жёсткий гейт — typecheck и сборка
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
      - name: Build (tsc -b + vite)
        run: npm run build
      - name: Test
        run: npm test --if-present
