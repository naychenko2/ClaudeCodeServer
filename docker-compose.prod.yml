services:
  onlyoffice:
    ports:
      - "8090:80"
      - "8443:443"
    volumes:
      - C:\certs\naychenko\fullchain.pem:/etc/ssl/onlyoffice/certs/onlyoffice.crt
      - C:\certs\naychenko\privkey.pem:/etc/ssl/onlyoffice/certs/onlyoffice.key
    environment:
      - SSL_CERTIFICATE_PATH=/etc/ssl/onlyoffice/certs/onlyoffice.crt
      - SSL_KEY_PATH=/etc/ssl/onlyoffice/certs/onlyoffice.key
